<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title id="p-meta-title">Memuat...</title>
    <meta name="description" id="p-meta-desc" content="">
    <meta name="keywords" id="p-meta-key" content="">
    <meta name="author" content="Mj-Shops">
    
    <meta property="og:type" content="website">
    <meta property="og:title" id="p-og-title" content="">
    <meta property="og:description" id="p-og-desc" content="">
    <meta property="og:image" id="p-og-img" content="">
    
    <script type="application/ld+json" id="p-schema"></script>

    <link rel="icon" href="https://mj-shops.biz.id/public/photo/logo-Mj-Shops.png" />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    
    <style>
        /* ... (Semua CSS dari file yang lu kirim tadi tempel di sini) ... */
        :root { --primary-color: #4a148c; --accent-color: #ff4081; --whatsapp-green: #25d366; --danger-red: #d32f2f; }
        body { font-family: 'Poppins', sans-serif; margin: 0; background: #f8f9fa; }
        header { background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), id="p-header-bg"; background-size: cover; height: 50vh; display: flex; flex-direction: column; justify-content: center; align-items: center; color: white; text-align: center; }
        .container { max-width: 900px; margin: 0 auto; padding: 20px; }
        .highlight-box { background: #fff; padding: 40px; border-radius: 30px; box-shadow: 0 20px 50px rgba(0,0,0,0.1); margin-top: -80px; }
        .image-preview { width: 100%; max-width: 500px; border-radius: 20px; display: block; margin: 0 auto 20px; }
        .final-price { font-size: 4rem; color: var(--primary-color); font-weight: 900; }
        .cta-button { display: block; background: var(--whatsapp-green); color: #fff; padding: 20px; text-align: center; border-radius: 50px; text-decoration: none; font-weight: 900; }
    </style>
</head>
<body>

    <header id="dynamic-header">
        <img src="https://mj-shops.biz.id/public/photo/logo-Mj-Shops.png" style="height: 60px;">
        <h1 id="p-title">Memuat Produk...</h1>
    </header>

    <div class="container">
        <div class="highlight-box">
            <div style="text-align: center;">
                <span class="badge-sale">✨ PROMO SPESIAL MJ-SHOPS ✨</span>
            </div>
            
            <img src="" id="p-main-img" class="image-preview">
            
            <div class="price-hero" style="text-align: center;">
                <p style="margin: 0; font-weight: bold; color: var(--primary-color);">HARGA KHUSUS HARI INI:</p>
                <span class="final-price" id="p-price">Rp 0</span>
            </div>

            <div id="p-desc" style="margin-bottom: 30px;">
                </div>

            <a href="" id="p-wa-link" class="cta-button">
                <i class="fab fa-whatsapp"></i> ORDER SEKARANG VIA WHATSAPP
            </a>
        </div>
    </div>

    <script>
        async function loadDetail() {
            const urlParams = new URLSearchParams(window.location.search);
            const id = urlParams.get('id');
            const USER = "hamudi2012";
            const REPO = "Mj-Shops";

            try {
                const res = await fetch(`https://raw.githubusercontent.com/${USER}/${REPO}/main/database/products/${id}.json`);
                const p = await res.json();

                // 1. INJEKSI KONTEN VISUAL
                document.getElementById('p-title').innerText = p.nama.toUpperCase();
                document.getElementById('p-main-img').src = p.foto;
                document.getElementById('p-price').innerText = `Rp ${parseInt(p.harga).toLocaleString('id-ID')}`;
                document.getElementById('p-desc').innerHTML = p.deskripsi;
                document.getElementById('dynamic-header').style.backgroundImage = `linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('${p.foto}')`;
                
                // Link WA Otomatis
                const waChat = `https://wa.me/6285691451094?text=Halo%20Mj-Shops,%20Saya%20mau%20order%20${p.nama}%20harga%20Rp%20${p.harga}!`;
                document.getElementById('p-wa-link').href = waChat;

                // 2. INJEKSI SEO (Sesuai Gaya Lu)
                document.title = `👗 ${p.nama} Murah di Sukabumi - Mj-Shops`;
                document.getElementById('p-meta-title').innerText = `${p.nama} Murah di Sukabumi`;
                document.getElementById('p-meta-desc').content = `Cari ${p.nama} murah di Sukabumi? Mj-Shops sedia produk cantik kekinian cuma Rp ${p.harga}! Lokasi Parungkuda. Cek sekarang!`;
                document.getElementById('p-meta-key').content = `${p.nama} murah, grosir ${p.nama}, mj-shops sukabumi, fashion parungkuda`;
                
                // Open Graph
                document.getElementById('p-og-title').content = `🔥 ${p.nama.toUpperCase()} - CUMA RP ${p.harga}!`;
                document.getElementById('p-og-desc').content = `Kualitas butik harga grosir. Stok terbatas area Sukabumi.`;
                document.getElementById('p-og-img').content = p.foto;

                // 3. INJEKSI LD+JSON (Schema Produk + Lokal)
                const schema = [
                    {
                        "@context": "https://schema.org/",
                        "@type": "Product",
                        "name": p.nama,
                        "image": [p.foto],
                        "description": p.deskripsi.replace(/<[^>]*>?/gm, ''), // bersihin tag html
                        "brand": { "@type": "Brand", "name": "Mj-Shops" },
                        "offers": {
                            "@type": "Offer",
                            "priceCurrency": "IDR",
                            "price": p.harga,
                            "availability": "https://schema.org/InStock"
                        }
                    },
                    {
                        "@context": "https://schema.org",
                        "@type": "LocalBusiness",
                        "name": "Mj-Shops Fashion Sukabumi",
                        "image": p.foto,
                        "telephone": "+6285691451094",
                        "address": {
                            "@type": "PostalAddress",
                            "streetAddress": "Kp Cipanggulaan RT 007, RW 003, Pondokasolandeuh",
                            "addressLocality": "Parungkuda",
                            "addressRegion": "Sukabumi, Jawa Barat",
                            "postalCode": "43357",
                            "addressCountry": "ID"
                        }
                    }
                ];
                document.getElementById('p-schema').text = JSON.stringify(schema);

            } catch (e) {
                console.error("Gagal memuat data produk");
            }
        }
        loadDetail();
    </script>
</body>
    </html>
