<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detail Produk | MJ-SHOPS</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <style>
        :root { --dark: #1a1a1a; --gold: #f1c40f; }
        body { font-family: 'Poppins', sans-serif; margin: 0; background: #f8f9fa; }
        .nav { background: var(--dark); padding: 15px; color: white; display: flex; align-items: center; gap: 15px; }
        .nav a { color: white; text-decoration: none; font-size: 20px; }
        .container { max-width: 500px; margin: auto; background: white; min-height: 100vh; }
        .main-img { width: 100%; height: 400px; object-fit: cover; }
        .info { padding: 20px; }
        .tag { background: var(--gold); color: black; padding: 3px 10px; border-radius: 5px; font-size: 10px; font-weight: 800; }
        h1 { font-size: 1.4rem; margin: 10px 0; text-transform: uppercase; font-weight: 800; }
        .price { font-size: 1.5rem; color: #27ae60; font-weight: 800; margin-bottom: 20px; }
        .desc { font-size: 0.9rem; color: #666; line-height: 1.6; border-top: 1px solid #eee; padding-top: 15px; }
        .wa-btn { position: fixed; bottom: 20px; left: 20px; right: 20px; background: #25d366; color: white; text-align: center; padding: 15px; border-radius: 10px; text-decoration: none; font-weight: 800; box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
    </style>
</head>
<body>

<div class="container">
    <div class="nav">
        <a href="katalog-produk.html"><i class="fas fa-arrow-left"></i></a>
        <span style="font-weight: 800; font-size: 14px;">DETAIL PRODUK</span>
    </div>

    <div id="loading" style="padding: 50px; text-align: center;">Memuat detail...</div>
    <div id="content" style="display: none;">
        <img id="p-foto" class="main-img">
        <div class="info">
            <span class="tag">NEW ARRIVAL</span>
            <h1 id="p-nama"></h1>
            <div class="price" id="p-harga"></div>
            <div class="desc">
                <b style="color:black">DESKRIPSI PRODUK:</b><br>
                <span id="p-desc"></span>
            </div>
        </div>
    </div>
    
    <a href="#" id="wa-link" class="wa-btn" target="_blank">
        <i class="fab fa-whatsapp"></i> BELI SEKARANG
    </a>
</div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const id = urlParams.get('id');

    async function load() {
        if(!id) return;
        try {
            const res = await fetch(`https://raw.githubusercontent.com/hamudi2012/Mj-E-commerce-/main/database/products/${id}.json`);
            const p = await res.json();

            document.getElementById('p-foto').src = p.foto;
            document.getElementById('p-nama').innerText = p.nama;
            document.getElementById('p-harga').innerText = "Rp " + parseInt(p.harga).toLocaleString('id-ID');
            document.getElementById('p-desc').innerText = p.deskripsi || "Tidak ada deskripsi.";
            
            const pesan = `Halo MJ-SHOPS, saya mau beli ${p.nama} seharga Rp ${parseInt(p.harga).toLocaleString('id-ID')}. Apakah stok ada?`;
            document.getElementById('wa-link').href = `https://wa.me/6285691451094?text=${encodeURIComponent(pesan)}`;

            document.getElementById('loading').style.display = 'none';
            document.getElementById('content').style.display = 'block';
        } catch(e) {
            document.getElementById('loading').innerText = "Produk tidak ditemukan.";
        }
    }
    load();
</script>
</body>
</html>
