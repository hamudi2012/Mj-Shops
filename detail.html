<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title id="meta-title">MJ-SHOPS</title>
    <meta name="description" id="meta-desc" content="">
    <meta property="og:image" id="og-img" content="">
    <script type="application/ld+json" id="p-schema"></script>

    <link rel="icon" href="https://mj-shops.biz.id/public/photo/logo-Mj-Shops.png" />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    
    <style>
        :root { --primary: #1a1a1a; --gold: #f1c40f; --bg: #f8f9fa; }
        body { font-family: 'Poppins', sans-serif; margin: 0; background: var(--bg); color: #333; }

        /* Nav & Menu (Sesuai index.html) */
        nav.top-nav { background: var(--primary); padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; }
        .nav-logo { height: 30px; }
        .menu { display: flex; justify-content: space-around; background: var(--primary); padding: 12px 0; position: sticky; top: 0; z-index: 1000; border-top: 1px solid #333; }
        .menu a { text-decoration: none; color: #fff; font-size: 10px; font-weight: 600; flex: 1; text-align: center; }

        .container { max-width: 600px; margin: 20px auto; padding: 0 15px 100px; }

        /* Product Display */
        .product-card { background: white; border-radius: 20px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .img-box { width: 100%; background: #fff; line-height: 0; }
        .img-box img { width: 100%; height: auto; object-fit: cover; }
        
        .content { padding: 25px; }
        .content h1 { font-size: 1.5rem; font-weight: 800; margin: 0; color: var(--primary); }
        
        .price-box { margin: 15px 0; display: flex; align-items: baseline; gap: 10px; }
        .p-new { color: #27ae60; font-weight: 800; font-size: 2rem; }
        .p-old { text-decoration: line-through; color: #bbb; font-size: 1rem; }

        /* --- AUTO BEAUTY DESCRIPTION STYLE --- */
        .desc-wrapper { 
            margin-top: 25px; 
            padding-top: 20px;
            border-top: 1px solid #eee;
            font-family: 'Inter', sans-serif;
            line-height: 1.8;
            color: #444;
        }
        
        /* Style untuk Baris Pertama / Judul Otomatis */
        .desc-wrapper h3 {
            color: var(--primary);
            font-size: 1.1rem;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .desc-wrapper h3::before {
            content: "";
            width: 4px;
            height: 20px;
            background: var(--gold);
            border-radius: 10px;
        }

        /* Style untuk List Otomatis */
        .desc-list { margin: 15px 0; padding: 0; list-style: none; }
        .desc-list li { 
            background: #fdfdfd; 
            margin-bottom: 8px; 
            padding: 10px 15px; 
            border-radius: 8px; 
            border: 1px solid #f0f0f0;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.95rem;
        }
        .desc-list li::before { content: "✨"; font-size: 0.9rem; }

        .btn-wa { 
            display: flex; align-items: center; justify-content: center; 
            background: #25d366; color: white; text-decoration: none; 
            padding: 18px; border-radius: 15px; font-weight: 800; 
            font-size: 1.1rem; margin-top: 30px; transition: 0.3s;
        }
        .btn-wa i { font-size: 1.5rem; margin-right: 12px; }
    </style>
</head>
<body>

<nav class="top-nav">
    <img src="https://mj-shops.biz.id/public/photo/logo-Mj-Shops.png" class="nav-logo">
    <div style="color: white; font-size: 10px; font-weight: bold;">PREMIUM STORE</div>
</nav>

<nav class="menu">
    <a href="index.html">HOME</a>
    <a href="produk.html">KATALOG</a>
    <a href="promo.html">PROMO</a>
    <a href="kontak.html">KONTAK</a>
</nav>

<div class="container">
    <div class="product-card" id="card" style="display:none;">
        <div class="img-box"><img src="" id="p-img"></div>
        <div class="content">
            <h1 id="p-name"></h1>
            <div class="price-box">
                <span class="p-new" id="p-price"></span>
                <span class="p-old" id="p-old"></span>
            </div>
            
            <div class="desc-wrapper" id="p-desc">
                </div>

            <a href="#" id="p-wa" class="btn-wa">
                <i class="fab fa-whatsapp"></i> BELI SEKARANG
            </a>
        </div>
    </div>
</div>

<script>
    // MESIN OTOMATIS PENYANTIK DESKRIPSI
    function autoBeauty(text) {
        let lines = text.split('\n').filter(line => line.trim() !== '');
        let htmlResult = "";
        let listActive = false;

        lines.forEach((line, index) => {
            let cleanLine = line.trim();
            
            // 1. Baris pertama otomatis jadi Judul Keren
            if (index === 0) {
                htmlResult += `<h3>${cleanLine}</h3>`;
            } 
            // 2. Kalau ada tanda bintang atau strip, jadi List Estetik
            else if (cleanLine.startsWith('*') || cleanLine.startsWith('-')) {
                if (!listActive) { htmlResult += '<div class="desc-list">'; listActive = true; }
                htmlResult += `<li>${cleanLine.replace(/^[\*\-]\s*/, '')}</li>`;
            } 
            // 3. Sisanya jadi teks paragraf rapi
            else {
                if (listActive) { htmlResult += '</div>'; listActive = false; }
                htmlResult += `<p style="margin-bottom:15px;">${cleanLine}</p>`;
            }
        });

        if (listActive) htmlResult += '</div>';
        return htmlResult;
    }

    async function loadData() {
        const id = new URLSearchParams(window.location.search).get('id');
        try {
            const res = await fetch(`https://raw.githubusercontent.com/hamudi2012/Mj-Shops/main/database/products/${id}.json`);
            const p = await res.json();

            document.getElementById('p-name').innerText = p.nama;
            document.getElementById('p-img').src = p.foto;
            document.getElementById('p-price').innerText = `Rp ${parseInt(p.harga).toLocaleString('id-ID')}`;
            document.getElementById('p-old').innerText = `Rp ${(parseInt(p.harga) * 1.5).toLocaleString('id-ID')}`;
            
            // JRENG! Langsung Cantik Disini
            document.getElementById('p-desc').innerHTML = autoBeauty(p.deskripsi);
            
            document.getElementById('p-wa').href = `https://wa.me/6285691451094?text=Order%20${p.nama}`;

            // SEO & Schema
            document.title = `${p.nama} - MJ-SHOPS Sukabumi`;
            document.getElementById('meta-desc').content = `Beli ${p.nama} murah di Sukabumi. Kualitas terbaik area Parungkuda.`;
            document.getElementById('og-img').content = p.foto;
            document.getElementById('p-schema').text = JSON.stringify({
                "@context": "https://schema.org/", "@type": "Product", "name": p.nama, "image": p.foto,
                "offers": { "@type": "Offer", "price": p.harga, "priceCurrency": "IDR" }
            });
            
            document.getElementById('card').style.display = 'block';
        } catch (e) { console.log("Error!"); }
    }
    loadData();
</script>
</body>
    </html>
