<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Owner Panel | MJ-SHOPS</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <style>
        :root { --dark: #1a1a1a; --gold: #f1c40f; --white: #ffffff; }
        body { font-family: 'Poppins', sans-serif; background: #121212; margin: 0; padding: 15px; color: var(--white); }
        .header { background: var(--dark); padding: 25px; border-radius: 20px; text-align: center; margin-bottom: 20px; border: 1px solid #333; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .header h2 { margin: 0; color: var(--gold); letter-spacing: 2px; font-weight: 800; }
        .card { background: #1e1e1e; padding: 20px; border-radius: 20px; border: 1px solid #333; margin-bottom: 20px; }
        label { font-size: 12px; color: var(--gold); font-weight: 600; }
        input, textarea { width: 100%; padding: 15px; margin: 8px 0 15px; border-radius: 12px; border: 1px solid #333; background: #252525; color: white; box-sizing: border-box; font-family: 'Poppins'; }
        .preview-container { width: 100%; height: 200px; border-radius: 12px; background: #252525; border: 2px dashed #444; display: flex; align-items: center; justify-content: center; overflow: hidden; margin-bottom: 15px; cursor: pointer; }
        #imgPreview { width: 100%; height: 100%; object-fit: contain; display: none; }
        button { width: 100%; padding: 18px; border-radius: 12px; border: none; background: var(--gold); color: black; font-weight: 800; font-size: 16px; cursor: pointer; text-transform: uppercase; width: 100%; }
        #status { text-align: center; font-size: 13px; margin-top: 15px; font-weight: 600; color: var(--gold); }
    </style>
</head>
<body>

<div class="header">
    <h2>MJ-SHOPS</h2>
    <p style="margin:0; font-size:10px; opacity:0.7">ULTRA-FAST ADMIN SYSTEM</p>
</div>

<div class="card">
    <label><i class="fas fa-camera"></i> Foto Produk</label>
    <div class="preview-container" onclick="document.getElementById('foto').click()">
        <i id="placeholderIcon" class="fas fa-plus-circle" style="font-size: 40px; color: #444;"></i>
        <img id="imgPreview">
    </div>
    <input type="file" id="foto" accept="image/*" onchange="preview()" style="display: none;">

    <label><i class="fas fa-tag"></i> Nama Barang</label>
    <input type="text" id="nama" placeholder="Contoh: Gamis Viral Bini Orang">

    <label><i class="fas fa-money-bill-wave"></i> Harga (Rp)</label>
    <input type="number" id="harga" placeholder="Contoh: 250000">

    <label><i class="fas fa-align-left"></i> Deskripsi Produk</label>
    <textarea id="deskripsi" rows="3" placeholder="Masukkan deskripsi barang..."></textarea>

    <button onclick="upload()" id="btnUpload">PAJANG SEKARANG</button>
    <div id="status">Sistem Siap.</div>
</div>

<script>
    const USER = "hamudi2012";
    const REPO = "Mj-Shops";

    function preview() {
        const p = document.getElementById('imgPreview');
        const icon = document.getElementById('placeholderIcon');
        const file = document.getElementById('foto').files[0];
        const reader = new FileReader();
        reader.onloadend = () => { p.src = reader.result; p.style.display = 'block'; icon.style.display = 'none'; }
        if(file) reader.readAsDataURL(file);
    }

    async function upload() {
        let tokenAsli = sessionStorage.getItem("token_mj");
        if (!tokenAsli) {
            tokenAsli = prompt("MASUKKAN TOKEN GITHUB LU:");
            if (tokenAsli) sessionStorage.setItem("token_mj", tokenAsli.trim());
        }
        if (!tokenAsli) return;

        const nama = document.getElementById('nama').value;
        const harga = document.getElementById('harga').value;
        const deskripsi = document.getElementById('deskripsi').value;
        const file = document.getElementById('foto').files[0];
        const stat = document.getElementById('status');
        const btn = document.getElementById('btnUpload');

        if(!nama || !harga || !file) return alert("Data gak boleh kosong!");

        stat.innerHTML = "⏳ Menghubungi Satelit GitHub...";
        btn.disabled = true;

        const id = Date.now();
        const reader = new FileReader();
        reader.readAsDataURL(file);
        
        reader.onload = async (e) => {
            const base64 = e.target.result.split(',')[1];
            try {
                const header = { "Authorization": `token ${tokenAsli.trim()}` };

                // 1. UPLOAD FOTO
                const resF = await fetch(`https://api.github.com/repos/${USER}/${REPO}/contents/public/photo/${id}.jpg`, {
                    method: "PUT", headers: header,
                    body: JSON.stringify({ message: `Foto: ${nama}`, content: base64 })
                });
                const dataF = await resF.json();
                const fotoUrl = dataF.content.download_url;

                // 2. SIMPAN DETAIL JSON (Buat halaman detail)
                const dataProd = { id, nama, harga, deskripsi, foto: fotoUrl };
                await fetch(`https://api.github.com/repos/${USER}/${REPO}/contents/database/products/${id}.json`, {
                    method: "PUT", headers: header,
                    body: JSON.stringify({ message: `Detail: ${nama}`, content: btoa(unescape(encodeURIComponent(JSON.stringify(dataProd)))) })
                });

                // 3. UPDATE LIST-PRODUK.JSON (Biar Katalog Ngebut)
                stat.innerHTML = "⏳ Menyelaraskan Katalog...";
                const resL = await fetch(`https://api.github.com/repos/${USER}/${REPO}/contents/database/list-produk.json`, { headers: header });
                
                let listData = [];
                let sha = null;

                if (resL.ok) {
                    const dataL = await resL.json();
                    sha = dataL.sha;
                    listData = JSON.parse(decodeURIComponent(escape(atob(dataL.content))));
                }

                // Tambah ke paling atas
                listData.unshift({ id, nama, harga, foto: fotoUrl });

                await fetch(`https://api.github.com/repos/${USER}/${REPO}/contents/database/list-produk.json`, {
                    method: "PUT", headers: header,
                    body: JSON.stringify({ 
                        message: "Update Katalog List", 
                        content: btoa(unescape(encodeURIComponent(JSON.stringify(listData)))),
                        sha: sha 
                    })
                });

                stat.innerHTML = "✅ BERHASIL!";
                alert("🔥 GACOR! Barang sudah tayang dan katalog sudah diperbarui.");
                location.reload();

            } catch(err) {
                alert("Gagal! Cek Token lu Bos.");
                sessionStorage.removeItem("token_mj");
                btn.disabled = false;
                stat.innerHTML = "❌ Gagal.";
            }
        };
    }
</script>
</body>
    </html>
