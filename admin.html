<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel | MJ-SHOPS</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --dark: #1a1a1a; --gold: #f1c40f; }
        body { font-family: 'Poppins', sans-serif; background: #f4f4f4; margin: 0; padding: 15px; }
        .header { background: var(--dark); color: white; padding: 20px; border-radius: 15px; text-align: center; margin-bottom: 20px; border-bottom: 4px solid var(--gold); }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); margin-bottom: 20px; }
        input, textarea, button { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; font-family: 'Poppins'; }
        button { background: var(--dark); color: var(--gold); border: none; font-weight: 800; cursor: pointer; text-transform: uppercase; }
        .btn-hapus { background: #e74c3c; color: white; width: auto; padding: 5px 15px; font-size: 12px; }
        .preview-img { width: 100%; height: 200px; object-fit: contain; background: #eee; border-radius: 8px; display: none; }
        .item-list { display: flex; align-items: center; gap: 10px; border-bottom: 1px solid #eee; padding: 10px 0; }
        .item-list img { width: 50px; height: 50px; object-fit: cover; border-radius: 5px; }
    </style>
</head>
<body>

<div class="header">
    <h2 style="margin:0">MANAGEMENT PRODUK</h2>
    <p style="margin:0; font-size:12px; color: var(--gold)">MJ-SHOPS EXCLUSIVE SYSTEM</p>
</div>

<div class="card">
    <img id="imgPreview" class="preview-img">
    <input type="text" id="nama" placeholder="Nama Barang">
    <input type="number" id="harga" placeholder="Harga (Angka saja)">
    <textarea id="deskripsi" placeholder="Deskripsi Produk (Ukuran, Bahan, dll)"></textarea>
    <input type="file" id="foto" accept="image/*" onchange="preview()">
    <button onclick="upload()" id="btnUpload">UPLOAD PRODUK</button>
    <div id="status" style="text-align:center; font-size:12px; margin-top:10px"></div>
</div>

<div class="card">
    <h3 style="margin-top:0">Stok Katalog Otomatis</h3>
    <div id="listProduk">Memuat data...</div>
</div>

<script>
    const USER = "hamudi2012";
    const REPO = "Mj-E-commerce-";
    const TOKEN = "ghp_MASUKKAN_SISA_TOKEN_LU_DISINI"; // MASUKKAN SISA TOKEN LU

    function preview() {
        const p = document.getElementById('imgPreview');
        const file = document.getElementById('foto').files[0];
        const reader = new FileReader();
        reader.onloadend = () => { p.src = reader.result; p.style.display = 'block'; }
        if(file) reader.readAsDataURL(file);
    }

    async function loadList() {
        const container = document.getElementById('listProduk');
        try {
            const res = await fetch(`https://api.github.com/repos/${USER}/${REPO}/contents/database/products/`);
            const files = await res.json();
            container.innerHTML = "";
            for(let f of files.reverse()) {
                if(f.name.endsWith('.json')) {
                    const d = await (await fetch(f.download_url)).json();
                    container.innerHTML += `
                        <div class="item-list">
                            <img src="${d.foto}">
                            <div style="flex:1"><b>${d.nama}</b></div>
                            <button class="btn-hapus" onclick="hapus('${f.path}','${d.foto}')">Hapus</button>
                        </div>`;
                }
            }
        } catch(e) { container.innerHTML = "Belum ada produk."; }
    }

    async function upload() {
        const nama = document.getElementById('nama').value;
        const harga = document.getElementById('harga').value;
        const deskripsi = document.getElementById('deskripsi').value;
        const file = document.getElementById('foto').files[0];
        if(!nama || !harga || !file) return alert("Isi semua data!");

        document.getElementById('status').innerText = "⏳ Memproses...";
        const id = Date.now();
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = async (e) => {
            const base64 = e.target.result.split(',')[1];
            try {
                // 1. Upload Foto
                const resF = await fetch(`https://api.github.com/repos/${USER}/${REPO}/contents/assets/uploads/${id}.jpg`, {
                    method: "PUT", headers: { "Authorization": `Bearer ${TOKEN}` },
                    body: JSON.stringify({ message: "foto", content: base64 })
                });
                const dataF = await resF.json();

                // 2. Simpan JSON
                const dataProd = { id, nama, harga, deskripsi, foto: dataF.content.download_url };
                await fetch(`https://api.github.com/repos/${USER}/${REPO}/contents/database/products/${id}.json`, {
                    method: "PUT", headers: { "Authorization": `Bearer ${TOKEN}` },
                    body: JSON.stringify({ message: "json", content: btoa(JSON.stringify(dataProd)) })
                });

                alert("Berhasil!"); location.reload();
            } catch(err) { alert("Gagal! Cek Token lu."); }
        };
    }

    async function hapus(path, fotoUrl) {
        if(!confirm("Hapus produk ini?")) return;
        // Logika hapus file via API (Perlu SHA, tapi biar simpel bisa lewat GitHub langsung atau tambahin kodingan SHA di sini)
        alert("Untuk keamanan, hapus file langsung di folder database/products di GitHub lu ya Bos!");
    }

    loadList();
</script>
</body>
  </html>
