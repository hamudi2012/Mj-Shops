<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Katalog Produk | Mj-Shops</title>
    <link rel="icon" href="https://mj-shops.biz.id/public/photo/logo-Mj-Shops.png" />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    
    <style>
        /* CSS DISINKRONKAN DENGAN INDEX LAMA */
        :root { --primary-color: #1a1a1a; --accent-gold: #f1c40f; --light-bg: #f8f9fa; }
        body { font-family: 'Poppins', sans-serif !important; margin: 0; background-color: var(--light-bg); }
        
        nav.top-nav { background: var(--primary-color); padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; }
        .nav-logo { height: 30px; }
        
        .menu { display: flex; background: var(--primary-color); padding: 12px 0; position: sticky; top: 0; z-index: 1000; border-top: 1px solid #333; }
        .menu a { text-decoration: none; color: #ffffff; font-size: 10px; font-weight: 600; flex: 1; text-align: center; text-transform: uppercase; }
        .menu a.active { color: var(--accent-gold); }

        .section-title { text-align: center; font-size: 1rem; margin: 30px 0 10px; font-weight: 800; color: var(--primary-color); text-transform: uppercase; letter-spacing: 1px; }

        /* GRID 2 KOLOM IDENTIK */
        .produk-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; padding: 10px; }

        /* KARTU BARANG SINKRON */
        .item-card { 
            background: white; border-radius: 10px; overflow: hidden; border: 1px solid #eee; 
            display: flex; flex-direction: column; text-decoration: none; color: inherit; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.05); transition: 0.3s;
        }
        .item-card img { width: 100%; height: 180px; object-fit: cover; }
        .card-info { padding: 10px; text-align: center; }
        .item-card h3 { 
            font-size: 0.75rem; font-weight: 800; color: #1a1a1a; text-transform: uppercase; 
            margin: 5px 0; height: 2.4em; overflow: hidden; line-height: 1.2;
        }
        .price-new { color: #27ae60; font-weight: 800; font-size: 0.9rem; }

        footer { background: var(--primary-color); color: white; padding: 40px 20px; text-align: center; margin-top: 50px; }
        .btn-home { background: #333; color: white; padding: 10px 20px; text-decoration: none; border-radius: 5px; font-size: 0.8rem; font-weight: 600; display: inline-block; margin-top: 10px; border: 1px solid var(--accent-gold); }

        @media (min-width: 768px) { .produk-grid { grid-template-columns: repeat(4, 1fr); } }
    </style>
</head>
<body>

<nav class="top-nav">
    <img src="https://mj-shops.biz.id/public/photo/logo-Mj-Shops.png" alt="Mj-Shops" class="nav-logo">
    <div style="color: white; font-size: 0.6rem; font-weight: bold;">PRODUK TERBARU</div>
</nav>

<nav class="menu">
    <a href="index.html">Home</a>
    <a href="#" class="active">Produk Terbaru</a>
    <a href="kontak.html">Bantuan</a>
</nav>

<main>
    <div class="section-title">📦 KOLEKSI PRODUK TERBARU</div>
    
    <div id="katalog-container" class="produk-grid">
        <p style="grid-column: span 2; text-align: center; padding: 50px; color: #888;">Memuat produk terbaru...</p>
    </div>
</main>

<footer>
    <img src="public/photo/logo-Mj-Shops.png" alt="Mj-Shops" style="height: 40px; margin-bottom: 10px;">
    <p style="font-size: 0.7rem; opacity: 0.7;">&copy; 2026 MJ-SHOPS INDONESIA.<br>Sistem Katalog Otomatis Aktif.</p>
    <a href="index.html" class="btn-home">KEMBALI KE HOME</a>
</footer>

<script>
    async function muatKatalog() {
        const container = document.getElementById('katalog-container');
        // SINKRONISASI REPO TERBARU
        const USER = "hamudi2012";
        const REPO = "Mj-Shops";

        try {
            // Ambil daftar file dari folder database/products
            const res = await fetch(`https://api.github.com/repos/${USER}/${REPO}/contents/database/products/`);
            const files = await res.json();
            
            // Filter hanya file JSON dan urutkan dari yang terbaru (ID terbesar)
            const jsonFiles = files.filter(f => f.name.endsWith('.json')).reverse();

            if (jsonFiles.length === 0) {
                container.innerHTML = "<p style='grid-column: span 2; text-align: center; padding: 50px;'>Belum ada produk tambahan di katalog otomatis.</p>";
                return;
            }

            container.innerHTML = ""; // Bersihkan loading

            for (let file of jsonFiles) {
                const resP = await fetch(file.download_url);
                const p = await resP.json();
                
                container.innerHTML += `
                    <a href="detail.html?id=${p.id}" class="item-card">
                        <img src="${p.foto}" alt="${p.nama}">
                        <div class="card-info">
                            <h3>${p.nama}</h3>
                            <span class="price-new">Rp ${parseInt(p.harga).toLocaleString('id-ID')}</span>
                        </div>
                    </a>
                `;
            }
        } catch (e) {
            container.innerHTML = "<p style='grid-column: span 2; text-align: center; padding: 50px;'>Gagal memuat katalog. Pastikan folder 'database/products' sudah ada di GitHub.</p>";
        }
    }
    muatKatalog();
</script>
</body>
</html>
