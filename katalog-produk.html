<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Katalog Produk Otomatis | Mj-Shops 2026</title>
    <link rel="icon" href="https://mj-shops.biz.id/public/photo/logo-Mj-Shops.png" />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    
    <style>
        /* CSS COPY-PASTE DARI INDEX LAMA LU */
        :root { --primary-color: #1a1a1a; --accent-gold: #f1c40f; --light-bg: #f8f9fa; }
        body { font-family: 'Poppins', sans-serif !important; margin: 0; padding: 0; background-color: var(--light-bg); color: #333; }
        nav.top-nav { background: var(--primary-color); padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; }
        .nav-logo { height: 30px; }
        .menu { display: flex; justify-content: space-around; background: var(--primary-color); padding: 12px 0; position: sticky; top: 0; z-index: 1000; border-top: 1px solid #333; }
        .menu a { text-decoration: none; color: #ffffff; font-size: 10px; font-weight: 600; flex: 1; text-align: center; }
        .menu a.active { color: var(--accent-gold); }

        /* GRID SYSTEM 2 KOLOM IDENTIK */
        .produk-grid { display: grid !important; grid-template-columns: repeat(2, 1fr) !important; gap: 10px !important; padding: 10px !important; }

        /* CARD STYLING IDENTIK */
        .item-card {
            background: white !important; border-radius: 10px !important; overflow: hidden !important;
            border: 1px solid #eee !important; display: flex !important; flex-direction: column !important;
            text-decoration: none !important; color: inherit !important; box-shadow: 0 2px 5px rgba(0,0,0,0.05) !important;
        }
        .item-card img { width: 100% !important; height: 160px !important; object-fit: cover !important; }
        .card-info { padding: 8px; text-align: center; }
        
        .item-card h3 {
            font-family: 'Poppins', sans-serif !important; font-size: 0.75rem !important; font-weight: 800 !important;
            color: #1a1a1a !important; text-transform: uppercase !important; margin: 5px 2px !important;
            line-height: 1.2 !important; height: 2.4em !important; overflow: hidden; display: -webkit-box;
            -webkit-line-clamp: 2; -webkit-box-orient: vertical;
        }
        .price-new { color: #27ae60; font-weight: 800; font-size: 0.9rem; display: block; }
        .section-title { text-align: center; font-size: 1rem; margin: 30px 0 10px; font-weight: 800; color: var(--primary-color); text-transform: uppercase; }
        
        footer { background: var(--primary-color); color: #777; padding: 30px 15px; text-align: center; font-size: 0.7rem; }
        .footer-nav a { background: #333; color: white; padding: 10px 20px; text-decoration: none; border-radius: 5px; display: inline-block; margin: 5px; }

        @media (min-width: 768px) { .produk-grid { grid-template-columns: repeat(4, 1fr) !important; } }
    </style>
</head>
<body>

<nav class="top-nav">
    <img src="https://mj-shops.biz.id/public/photo/logo-Mj-Shops.png" alt="Mj-Shops" class="nav-logo">
    <div style="color: white; font-size: 0.6rem; font-weight: bold;">KATALOG OTOMATIS</div>
</nav>

<nav class="menu">
    <a href="index.html">Home</a>
    <a href="#" class="active">Katalog Baru</a>
    <a href="kontak.html">Kontak</a>
</nav>

<main>
    <div class="section-title">📦 KOLEKSI PRODUK TERBARU</div>
    
    <div id="katalog-container" class="produk-grid">
        <p style="grid-column: span 2; text-align: center; padding: 50px; color: #888;">Mencari produk baru...</p>
    </div>
</main>

<footer>
    <p>&copy; 2026 Mj-Shops. Sistem Update Otomatis Aktif.</p>
    <div class="footer-nav">
        <a href="index.html">KEMBALI KE HOME</a>
    </div>
</footer>

<script>
    async function muatKatalog() {
        const container = document.getElementById('katalog-container');
        const USERNAME = "hamudi2012";
        const REPO = "Mj-E-commerce-";

        try {
            const res = await fetch(`https://api.github.com/repos/${USERNAME}/${REPO}/contents/database/products/`);
            const files = await res.json();
            const jsonFiles = files.filter(f => f.name.endsWith('.json')).reverse();

            if (jsonFiles.length === 0) {
                container.innerHTML = "<p style='grid-column: span 2; text-align: center;'>Belum ada produk tambahan.</p>";
                return;
            }

            container.innerHTML = ""; // Bersihkan loading

            for (let file of jsonFiles) {
                const resP = await fetch(file.download_url);
                const p = await resP.json();
                
                container.innerHTML += `
                    <a href="detail.html?id=${p.id}" class="item-card">
                        <img src="${p.foto}" alt="${p.nama}">
                        <div class="card-info">
                            <h3>${p.nama}</h3>
                            <span class="price-new">Rp ${parseInt(p.harga).toLocaleString('id-ID')}</span>
                        </div>
                    </a>
                `;
            }
        } catch (e) {
            container.innerHTML = "<p style='grid-column: span 2; text-align: center;'>Gagal memuat katalog.</p>";
        }
    }
    muatKatalog();
</script>
</body>
  </html>
