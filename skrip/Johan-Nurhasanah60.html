<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Undangan Pernikahan</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --gold: #D4AF37; --dark: #0a0a0a; --glass: rgba(255, 255, 255, 0.05); }
        body { background: var(--dark); color: #fff; font-family: sans-serif; margin: 0; overflow: hidden; }

        /* COVER */
        #overlayer { position: fixed; inset: 0; z-index: 2000; background: #000; display: flex; align-items: center; justify-content: center; text-align: center; }
        .btn-main { background: var(--gold); color: #000; font-weight: 800; padding: 15px 30px; border: none; border-radius: 50px; }

        /* CONTENT */
        .content-area { height: 100vh; overflow-y: auto; padding-bottom: 150px; }
        .panel { display: none; text-align: center; padding: 40px 20px; }
        .panel.active { display: block; animation: fadeIn 0.5s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* NAVIGASI */
        .nav-bar { position: fixed; bottom: 0; width: 100%; height: 70px; background: rgba(0,0,0,0.9); display: flex; border-top: 1px solid var(--gold); z-index: 1500; }
        .nav-item { flex: 1; border: none; background: none; color: #555; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .nav-item.active { color: var(--gold); }
        .nav-item i { font-size: 1.2rem; }
        .nav-item span { font-size: 0.6rem; font-weight: bold; }
        
        .luxury-card { background: var(--glass); border: 1px solid var(--gold); padding: 20px; border-radius: 15px; margin-bottom: 15px; }
    </style>
</head>
<body>

<div id="overlayer">
    <div class="container">
        <h4 style="letter-spacing: 5px;">THE WEDDING</h4>
        <h1 style="color:var(--gold)">Johan & Nurhasanah</h1>
        <button class="btn-main mt-4" onclick="mulai()">Buka Undangan</button>
    </div>
</div>

<div class="content-area" id="mainContent">
    <div id="p0" class="panel active"><h2>Home</h2><p>Selamat Datang di Undangan Kami</p></div>
    <div id="p1" class="panel"><h2>Mempelai</h2><p>Johan & Nurhasanah</p></div>
    <div id="p2" class="panel"><h2>Event</h2><p>Detail Acara</p></div>
    <div id="p3" class="panel"><h2>Story</h2><p>Kisah Kami</p></div>
    <div id="p4" class="panel"><h2>Gift</h2><p>Digital Envelope</p></div>
    <div id="p5" class="panel">
        <h2>RSVP</h2>
        <div class="luxury-card text-start">
            <input type="text" id="namaTamu" class="form-control mb-2" placeholder="Nama Anda">
            <textarea id="pesan" class="form-control mb-2" placeholder="Doa & Ucapan"></textarea>
            <button onclick="sendRSVP()" class="btn-main w-100">Kirim</button>
        </div>
        <div id="realtime-list" class="text-start">Memuat...</div>
    </div>
    <div id="p6" class="panel"><h2>Galeri</h2><p>Foto</p></div>
    <div id="p7" class="panel"><h2>Terima Kasih</h2><p>Wassalamu'alaikum</p></div>
</div>

<div class="nav-bar">
    <button class="nav-item active" onclick="buka(0, this)"><span>HOME</span></button>
    <button class="nav-item" onclick="buka(1, this)"><span>COUPLE</span></button>
    <button class="nav-item" onclick="buka(2, this)"><span>EVENT</span></button>
    <button class="nav-item" onclick="buka(3, this)"><span>STORY</span></button>
    <button class="nav-item" onclick="buka(4, this)"><span>GIFT</span></button>
    <button class="nav-item" onclick="buka(5, this)"><span>RSVP</span></button>
    <button class="nav-item" onclick="buka(6, this)"><span>PHOTO</span></button>
    <button class="nav-item" onclick="buka(7, this)"><span>THX</span></button>
</div>

<script>
    const REPO = "hamudi2012/Mj-Shops";
    const PROJECT_ID = window.location.pathname.split('/').pop().replace('.html', '');

    function mulai() {
        document.getElementById('overlayer').style.display = 'none';
        load();
    }

    function buka(idx, el) {
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById('p' + idx).classList.add('active');
        el.classList.add('active');
    }

    const load = async () => {
        const list = document.getElementById('realtime-list');
        try {
            const res = await fetch(`https://api.github.com/repos/${REPO}/contents/database/${PROJECT_ID}`);
            if(res.status === 404) return list.innerHTML = "Belum ada ucapan.";
            const files = await res.json();
            list.innerHTML = '';
            files.reverse().forEach(async (f) => {
                const d = await (await fetch(f.download_url)).json();
                list.innerHTML += `<div class="luxury-card"><b>${d.nama}</b><br>${d.pesan}</div>`;
            });
        } catch(e) { console.log(e); }
    };

    window.sendRSVP = async () => {
        const tkn = localStorage.getItem('mj_tkn');
        const n = document.getElementById('namaTamu').value, p = document.getElementById('pesan').value;
        if(!n || !p) return alert("Isi nama & pesan");
        await fetch(`https://api.github.com/repos/${REPO}/dispatches`, {
            method:'POST', headers:{'Authorization':'token '+tkn},
            body:JSON.stringify({
                event_type:'simpan-ucapan', 
                client_payload:{ project_id:PROJECT_ID, data:{nama:n, pesan:p, waktu:new Date().toLocaleString()} }
            })
        });
        alert('Terkirim!'); load();
    };
</script>

</html>
