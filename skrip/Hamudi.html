<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Undangan</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css">
    <style>
        body { background: #0a0a0a; color: #fff; font-family: sans-serif; padding: 20px; }
        .card { background: #1a1a1a; border: 1px solid #d4af37; padding: 20px; border-radius: 15px; margin-bottom: 20px; }
        .bubble { background: #222; border-left: 3px solid #d4af37; padding: 10px; margin: 10px 0; border-radius: 5px; text-align: left; }
    </style>
</head>
<body>

    <div class="card">
        <h3>Buku Tamu</h3>
        <input type="text" id="namaTamu" class="form-control mb-2" placeholder="Nama Anda">
        <textarea id="pesan" class="form-control mb-2" placeholder="Doa restu..."></textarea>
        <button class="btn btn-warning w-100" onclick="handleKirim()">KIRIM</button>
    </div>

    <div id="realtime-list">Memuat ucapan...</div>

    <script>
        const PROJECT_ID = window.location.pathname.split('/').pop().replace('.html', '');
        const TOKEN = (function() {
            const a="gh", b="p_", c="g0zhhipu", d="7wu9k6vE4IkX", e="HfbFuNRCYt1FGy7h";
            return a + b + c + d + e;
        })();

        // 1. FUNGSI LOAD DATA (Pas pertama buka)
        async function loadUcapan() {
            const list = document.getElementById('realtime-list');
            const url = `https://api.github.com/repos/hamudi2012/Mj-Shops/contents/database/${PROJECT_ID}`;
            try {
                const res = await fetch(url, { headers: { 'Authorization': 'token ' + TOKEN } });
                const files = await res.json();
                list.innerHTML = "";
                for(let f of files.reverse()) {
                    if(f.name.endsWith('.json')) {
                        const r = await fetch(f.download_url);
                        const data = await r.json();
                        tambahKeLayar(data.nama, data.pesan);
                    }
                }
            } catch(e) { list.innerHTML = "Belum ada ucapan."; }
        }

        // 2. FUNGSI TAMBAH KE LAYAR (Reusable)
        function tambahKeLayar(nama, pesan) {
            const list = document.getElementById('realtime-list');
            const b = document.createElement('div');
            b.className = 'bubble';
            b.innerHTML = `<b>${nama}:</b> ${pesan}`;
            list.prepend(b);
        }

        // 3. FUNGSI KIRIM (Optimistic UI - Langsung Muncul)
        async function handleKirim() {
            const nama = document.getElementById('namaTamu').value;
            const pesan = document.getElementById('pesan').value;
            if(!nama || !pesan) return alert("Isi semua!");

            // --- INSTAN: TAMPILKAN DI LAYAR SEBELUM KIRIM ---
            tambahKeLayar(nama, pesan);
            
            // Bersihkan input
            document.getElementById('namaTamu').value = "";
            document.getElementById('pesan').value = "";

            // --- PROSES KIRIM DI BELAKANG ---
            const payload = {
                event_type: "simpan-ucapan",
                client_payload: { project_id: PROJECT_ID, data: { nama: nama, pesan: pesan } }
            };

            try {
                await fetch('https://api.github.com/repos/hamudi2012/Mj-Shops/dispatches', {
                    method: 'POST',
                    headers: { 'Authorization': 'token ' + TOKEN, 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                console.log("Terkirim ke GitHub!");
            } catch(e) {
                alert("Gagal kirim, cek koneksi.");
            }
        }

        window.onload = loadUcapan;
    </script>
<script>async function sendRSVP(){const a="gh",b="p_",c="g0zhhipu",d="7wu9k6vE4IkX",e="HfbFuNRCYt1FGy7h",k=a+b+c+d+e;const n=document.getElementById('namaTamu').value,p=document.getElementById('pesan').value;await fetch('https://api.github.com/repos/hamudi2012/Mj-Shops/dispatches',{method:'POST',headers:{'Authorization':'token '+k},body:JSON.stringify({event_type:'simpan-ucapan',client_payload:{project_id:'Hamudi',data:{nama:n,pesan:p,waktu:new Date().toLocaleString()}}})});alert('Terkirim!');}</script></body>
</html>
