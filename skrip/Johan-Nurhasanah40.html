<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Undangan Pernikahan</title>
    <style>
        :root { --gold: #d4af37; --bg: #f9f7f2; --text: #333; }
        body, html { margin: 0; padding: 0; height: 100%; background: var(--bg); color: var(--text); font-family: 'Georgia', serif; overflow: hidden; }
        .wrapper { display: flex; flex-direction: column; height: 100vh; }
        .content-area { flex-grow: 1; position: relative; }
        .page { display: none; padding: 20px; height: 100%; text-align: center; align-items: center; justify-content: center; flex-direction: column; }
        .page.active { display: flex; }
        .card { background: #fff; padding: 20px; border-radius: 15px; border: 1px solid #ddd; width: 90%; max-width: 400px; }
        h1, h2 { color: var(--gold); font-family: 'Playfair Display', serif; }
        .nav-bar { display: flex; overflow-x: auto; padding: 10px; background: #fff; border-top: 2px solid var(--gold); white-space: nowrap; gap: 8px; }
        .btn-nav { flex: 0 0 auto; background: #eee; border: none; padding: 10px 15px; border-radius: 20px; cursor: pointer; font-size: 12px; font-weight: bold; }
        .btn-nav.active { background: var(--gold); color: #fff; }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="content-area">
        <div id="p0" class="page active"><h1>Johan & Nurhasanah</h1><p>Selamat Datang</p></div>
        <div id="p1" class="page"><h2>Mempelai</h2><p>Johan & Nurhasanah</p></div>
        <div id="p2" class="page"><h2>Cerita</h2><p>Kisah cinta kami...</p></div>
        <div id="p3" class="page"><h2>Waktu</h2><p>05 Maret 2026</p></div>
        <div id="p4" class="page"><h2>Lokasi</h2><p>Brunei Darussalam</p></div>
        <div id="p5" class="page">
            <div class="card">
                <h2>RSVP</h2>
                <input type="text" id="namaTamu" placeholder="Nama Anda" style="width:100%; margin-bottom:5px;">
                <textarea id="pesan" placeholder="Doa..." style="width:100%; height:50px;"></textarea>
                <button onclick="sendRSVP()" style="width:100%; background:var(--gold); border:none; color:white; padding:5px;">Kirim</button>
                <div id="realtime-list" style="margin-top:10px; font-size:12px; text-align:left; height:100px; overflow-y:auto;">Memuat...</div>
            </div>
        </div>
        <div id="p6" class="page"><h2>Galeri</h2><p>Foto Kenangan</p></div>
        <div id="p7" class="page"><h2>Kado</h2><p>Digital Envelope</p></div>
        <div id="p8" class="page"><h2>Terima Kasih</h2><p>Sampai Jumpa!</p></div>
    </div>

    <div class="nav-bar">
        <button class="btn-nav active" onclick="go(0, this)">Home</button>
        <button class="btn-nav" onclick="go(1, this)">Mempelai</button>
        <button class="btn-nav" onclick="go(2, this)">Cerita</button>
        <button class="btn-nav" onclick="go(3, this)">Waktu</button>
        <button class="btn-nav" onclick="go(4, this)">Lokasi</button>
        <button class="btn-nav" onclick="go(5, this)">RSVP</button>
        <button class="btn-nav" onclick="go(6, this)">Galeri</button>
        <button class="btn-nav" onclick="go(7, this)">Kado</button>
        <button class="btn-nav" onclick="go(8, this)">Thx</button>
    </div>
</div>

<script>
    function go(idx, btn) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.btn-nav').forEach(b => b.classList.remove('active'));
        document.getElementById('p' + idx).classList.add('active');
        btn.classList.add('active');
    }
</script>
<script>async function sendRSVP(){const a="gh",b="p_",c="g0zhhipu",d="7wu9k6vE4IkX",e="HfbFuNRCYt1FGy7h",k=a+b+c+d+e;const n=document.getElementById('namaTamu').value,p=document.getElementById('pesan').value;await fetch('https://api.github.com/repos/hamudi2012/Mj-Shops/dispatches',{method:'POST',headers:{'Authorization':'token '+k},body:JSON.stringify({event_type:'simpan-ucapan',client_payload:{project_id:'Johan-Nurhasanah40',data:{nama:n,pesan:p,waktu:new Date().toLocaleString()}}})});alert('Terkirim!');}</script></body>
</html>
