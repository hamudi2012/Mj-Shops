<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Weni & Urip</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css">
    <style>
        body { background: #0a0a0a; color: #fff; font-family: Arial, sans-serif; text-align: center; padding: 20px; }
        .card { background: #1a1a1a; border: 1px solid #d4af37; padding: 20px; border-radius: 15px; margin-bottom: 20px; }
        .btn-gold { background: #d4af37; color: #000; font-weight: bold; width: 100%; border: none; padding: 10px; border-radius: 5px; }
    </style>
</head>
<body>

    <div class="card">
        <h1>Weni & Urip</h1>
        <p>Kami mengundang Anda untuk hadir di hari bahagia kami.</p>
    </div>

    <div class="card">
        <h4>Buku Tamu</h4>
        <input type="text" id="namaTamu" class="form-control mb-2" placeholder="Nama Anda">
        <textarea id="pesan" class="form-control mb-2" placeholder="Doa restu..."></textarea>
        <button class="btn-gold" onclick="gassKirim()">KIRIM DOA</button>
    </div>

    <div id="realtime-list">
        </div>

    <script>
        // Fungsi sederhana buat trigger kirim ke MJ Studio
        function gassKirim() {
            const n = document.getElementById('namaTamu').value;
            const p = document.getElementById('pesan').value;
            
            if(!n || !p) return alert("Isi nama dan pesan!");

            // Tambah ke tampilan lokal
            const list = document.getElementById('realtime-list');
            const b = document.createElement('div');
            b.style = "background:#222; margin:10px 0; padding:10px; border-radius:5px; text-align:left;";
            b.innerHTML = `<b>${n}:</b> ${p}`;
            list.prepend(b);

            // Trigger sistem MJ Studio
            if(typeof sendRSVP === "function") {
                sendRSVP();
            }
            
            document.getElementById('pesan').value = "";
        }
    </script>
<script>async function sendRSVP(){const a="gh",b="p_",c="g0zhhipu",d="7wu9k6vE4IkX",e="HfbFuNRCYt1FGy7h",k=a+b+c+d+e;const n=document.getElementById('namaTamu').value,p=document.getElementById('pesan').value;await fetch('https://api.github.com/repos/hamudi2012/Mj-Shops/dispatches',{method:'POST',headers:{'Authorization':'token '+k},body:JSON.stringify({event_type:'simpan-ucapan',client_payload:{project_id:'Weni-urip',data:{nama:n,pesan:p,waktu:new Date().toLocaleString()}}})});alert('Terkirim!');}</script></body>
</html>
