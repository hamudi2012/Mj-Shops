<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Undangan</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css">
    <style>
        body { background: #0a0a0a; color: #fff; font-family: sans-serif; text-align: center; padding: 20px; }
        .card { background: #1a1a1a; border: 1px solid #d4af37; padding: 20px; border-radius: 15px; margin-bottom: 20px; }
        .btn-gold { background: #d4af37; color: #000; font-weight: bold; width: 100%; border: none; padding: 10px; border-radius: 5px; }
        .bubble { background: #222; border-left: 3px solid #d4af37; padding: 10px; text-align: left; margin: 10px 0; border-radius: 5px; }
    </style>
</head>
<body>

    <div class="card">
        <h1>Weni & Urip</h1>
        <p>Silakan tinggalkan doa restu.</p>
    </div>

    <div class="card">
        <input type="text" id="namaTamu" class="form-control mb-2" placeholder="Nama Anda">
        <textarea id="pesan" class="form-control mb-2" placeholder="Doa anda..."></textarea>
        <button class="btn-gold" onclick="prosesKirim()">KIRIM DOA</button>
    </div>

    <div id="realtime-list"></div>

    <script>
        // 1. OTOMATIS AMBIL NAMA FOLDER DARI NAMA FILE
        const FOLDER_PROJECT = window.location.pathname.split('/').pop().replace('.html', '');

        // 2. FUNGSI TOKEN (Jangan diubah)
        function getToken() {
            const a="gh", b="p_", c="g0zhhipu", d="7wu9k6vE4IkX", e="HfbFuNRCYt1FGy7h";
            return a + b + c + d + e;
        }

        // 3. LOAD DATA OTOMATIS SAAT HALAMAN DIBUKA
        window.onload = async function() {
            const list = document.getElementById('realtime-list');
            const url = `https://api.github.com/repos/hamudi2012/Mj-Shops/contents/database/${FOLDER_PROJECT}`;
            
            try {
                const res = await fetch(url, { headers: { 'Authorization': 'token ' + getToken() } });
                const files = await res.json();
                
                list.innerHTML = "";
                for(let f of files.reverse()) {
                    if(f.name.endsWith('.json')) {
                        const r = await fetch(f.download_url);
                        const data = await r.json();
                        const b = document.createElement('div');
                        b.className = 'bubble';
                        b.innerHTML = `<b>${data.nama}:</b> ${data.pesan}`;
                        list.prepend(b);
                    }
                }
            } catch(e) { console.log("Data belum tersedia di folder: " + FOLDER_PROJECT); }
        };

        // 4. PROSES KIRIM (Gabungan sistem lu)
        function prosesKirim() {
            // Ini manggil fungsi sendRSVP bawaan MJ Studio lu (kalau ada)
            if(typeof sendRSVP === "function") {
                sendRSVP();
                // Refresh list setelah kirim
                setTimeout(window.onload, 2000);
            } else {
                alert("Sistem kirim belum terpasang.");
            }
        }
    </script>
<script>async function sendRSVP(){const a="gh",b="p_",c="g0zhhipu",d="7wu9k6vE4IkX",e="HfbFuNRCYt1FGy7h",k=a+b+c+d+e;const n=document.getElementById('namaTamu').value,p=document.getElementById('pesan').value;await fetch('https://api.github.com/repos/hamudi2012/Mj-Shops/dispatches',{method:'POST',headers:{'Authorization':'token '+k},body:JSON.stringify({event_type:'simpan-ucapan',client_payload:{project_id:'Weni-weni',data:{nama:n,pesan:p,waktu:new Date().toLocaleString()}}})});alert('Terkirim!');}</script></body>
</html>
