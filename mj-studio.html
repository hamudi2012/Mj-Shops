<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Undangan v2.0</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        body { background: #f0f2f5; font-family: sans-serif; overflow: hidden; }
        .app-shell { max-width: 450px; margin: auto; height: 100vh; background: white; display: flex; flex-direction: column; position: relative; }
        .content { flex: 1; overflow-y: auto; padding: 20px; }
        .nav-bottom { display: grid; grid-template-columns: 1fr 1fr; border-top: 1px solid #ddd; padding: 10px; background: #fff; }
        .preview-img { width: 100%; height: 200px; border-radius: 15px; object-fit: cover; margin-top: 10px; border: 2px dashed #ccc; }
        .card-arsip { border-radius: 12px; border: 1px solid #eee; padding: 12px; margin-bottom: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .btn-nav { border: none; padding: 10px; background: none; font-weight: bold; color: #888; }
        .btn-nav.active { color: #007bff; border-bottom: 2px solid #007bff; }
    </style>
</head>
<body x-data="adminSystem()" x-init="checkToken()">

    <div class="app-shell">
        <div class="p-3 bg-dark text-white d-flex justify-content-between align-items-center">
            <h6 class="m-0">Admin Dashboard</h6>
            <button @click="logout()" class="btn btn-sm btn-outline-danger">Logout</button>
        </div>

        <div class="content">
            <div x-show="tab === 'upload'">
                <label class="fw-bold mb-2">Upload Foto Baru</label>
                <input type="file" id="fileInp" class="form-control" @change="previewFile">
                
                <template x-if="imageUrl">
                    <img :src="imageUrl" class="preview-img">
                </template>
                <template x-if="!imageUrl">
                    <div class="preview-img d-flex align-items-center justify-content-center text-muted">Belum ada foto dipilih</div>
                </template>

                <button @click="simpanData()" class="btn btn-primary w-100 mt-3 py-3 fw-bold">🚀 Simpan ke Arsip</button>
            </div>

            <div x-show="tab === 'archive'">
                <label class="fw-bold mb-3 text-primary">Daftar Arsip Undangan</label>
                <template x-for="(item, index) in listArsip" :key="index">
                    <div class="card-arsip">
                        <div class="d-flex align-items-center mb-2">
                            <img :src="item.url" width="50" height="50" class="rounded me-2" style="object-fit: cover;">
                            <span class="small fw-bold text-truncate" x-text="item.nama"></span>
                        </div>
                        <div class="d-flex gap-1 justify-content-between">
                            <button @click="window.open(item.url)" class="btn btn-sm btn-dark flex-grow-1">Buka</button>
                            <button @click="copyUrl(item.url)" class="btn btn-sm btn-warning text-white flex-grow-1">Kopi URL</button>
                            <button @click="hapus(index)" class="btn btn-sm btn-danger flex-grow-1">Hapus</button>
                        </div>
                    </div>
                </template>
            </div>
        </div>

        <div class="nav-bottom">
            <button @click="tab = 'upload'" :class="tab === 'upload' ? 'active' : ''" class="btn-nav">UPLOAD</button>
            <button @click="tab = 'archive'" :class="tab === 'archive' ? 'active' : ''" class="btn-nav">ARSIP</button>
        </div>
    </div>

    <script>
        function adminSystem() {
            return {
                tab: 'upload',
                token: '',
                imageUrl: null,
                listArsip: JSON.parse(localStorage.getItem('my_archive') || '[]'),

                checkToken() {
                    let savedToken = localStorage.getItem('gh_token');
                    if (!savedToken) {
                        let pass = prompt("Masukkan Token GitHub Anda:");
                        if (pass) {
                            localStorage.setItem('gh_token', pass);
                            this.token = pass;
                        }
                    } else {
                        this.token = savedToken;
                    }
                },

                previewFile(e) {
                    const file = e.target.files[0];
                    if (file) this.imageUrl = URL.createObjectURL(file);
                },

                simpanData() {
                    if (!this.imageUrl) return alert("Pilih foto dulu!");
                    // Simpan ke array arsip
                    this.listArsip.unshift({
                        nama: "Undangan_" + new Date().getTime(),
                        url: this.imageUrl
                    });
                    localStorage.setItem('my_archive', JSON.stringify(this.listArsip));
                    alert("Berhasil disimpan!");
                    this.tab = 'archive';
                    this.imageUrl = null;
                },

                copyUrl(url) {
                    navigator.clipboard.writeText(url);
                    alert("URL dikopi!");
                },

                hapus(index) {
                    if(confirm("Hapus file ini?")) {
                        this.listArsip.splice(index, 1);
                        localStorage.setItem('my_archive', JSON.stringify(this.listArsip));
                    }
                },

                logout() {
                    localStorage.removeItem('gh_token');
                    location.reload();
                }
            }
        }
    </script>
</body>
</html>
