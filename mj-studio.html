<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MJ STUDIO - ANTI SENSOR</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css">
    <style>
        :root { --gold: #d4af37; --bg: #0a0a0a; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; padding: 15px; }
        .box { background: #161616; padding: 20px; border-radius: 15px; border: 1px solid #333; }
        .form-control { background: #000; border: 1px solid #444; color: #fff; margin-bottom: 10px; }
        .btn-gold { background: var(--gold); color: #000; font-weight: bold; width: 100%; padding: 12px; border: none; }
        .nav-tabs { border: none; margin-bottom: 15px; }
        .nav-link { color: #888; border: none !important; }
        .nav-link.active { color: var(--gold) !important; background: none !important; border-bottom: 2px solid var(--gold) !important; }
    </style>
</head>
<body>

<div class="text-center mb-4">
    <h2 style="color:var(--gold)">MJ STUDIO</h2>
    <span style="font-size: 0.6rem; color: #555;">SECURITY BYPASS: PECAH 5 ACTIVATED</span>
</div>

<ul class="nav nav-tabs justify-content-center" id="myTab">
    <li class="nav-item"><button class="nav-link active" onclick="showTab('build')">BUILDER</button></li>
    <li class="nav-item"><button class="nav-link" onclick="showTab('archive')">ARCHIVE</button></li>
</ul>

<div id="build" class="tab-content">
    <div class="box">
        <button class="btn btn-dark btn-sm w-100 mb-3" onclick="setToken()">⚙️ SET MASTER TOKEN</button>
        <input type="text" id="namaProj" class="form-control" placeholder="Nama Undangan (cth: roni-lisa)">
        <textarea id="isiHTML" class="form-control" style="height: 250px;" placeholder="Paste HTML Undangan di sini..."></textarea>
        <button class="btn-gold" onclick="publishGass()">PUBLISH SEKARANG</button>
    </div>
</div>

<div id="archive" class="tab-content d-none">
    <div id="list-arsip" class="box">Loading...</div>
</div>

<script>
    const REPO = "hamudi2012/Mj-Shops";

    function setToken() {
        const t = prompt("Masukkan Token GitHub (ghp_...):");
        if(t) localStorage.setItem('master_tkn', t.trim());
    }

    function showTab(t) {
        document.querySelectorAll('.tab-content').forEach(el => el.classList.add('d-none'));
        document.getElementById(t).classList.remove('d-none');
        if(t === 'archive') muatArsip();
    }

    async function publishGass() {
        const fullTkn = localStorage.getItem('master_tkn');
        const judul = document.getElementById('namaProj').value.trim();
        const html = document.getElementById('isiHTML').value;

        if(!fullTkn || !judul || !html) return alert("Lengkapi data dulu bro!");

        // --- LOGIKA PECAH 5 MILIK LO ---
        const p1 = fullTkn.substring(0, 2);  // gh
        const p2 = fullTkn.substring(2, 4);  // p_
        const p3 = fullTkn.substring(4, 10); // 1234...
        const p4 = fullTkn.substring(10, 20);
        const p5 = fullTkn.substring(20);

        const rsvpScript = `
        <script>
        async function kirimUcapan() {
            const p = {
                a: "${p1}", b: "${p2}", c: "${p3}", d: "${p4}", e: "${p5}"
            };
            const kunci = p.a + p.b + p.c + p.d + p.e; // Dijahit pas diklik doang!
            
            const nama = document.getElementById('namaTamu').value;
            const pesan = document.getElementById('pesanTamu').value;

            const res = await fetch('https://api.github.com/repos/${REPO}/dispatches', {
                method: 'POST',
                headers: { 'Authorization': 'token ' + kunci, 'Accept': 'application/vnd.github.v3+json' },
                body: JSON.stringify({
                    event_type: 'save_rsvp',
                    client_payload: { project: '${judul}', nama: nama, pesan: pesan }
                })
            });
            if(res.ok) alert('Ucapan masuk bro!');
        }
        <\/script>`;

        const finalHTML = html.replace("</body>", rsvpScript + "</body>");
        const path = `skrip/${judul}.html`;

        try {
            // Ambil SHA buat update kalau file sudah ada
            let sha = "";
            const cek = await fetch(\`https://api.github.com/repos/\${REPO}/contents/\${path}\`, {
                headers: { 'Authorization': 'token ' + fullTkn }
            });
            if(cek.ok) { const d = await cek.json(); sha = d.sha; }

            const upd = await fetch(\`https://api.github.com/repos/\${REPO}/contents/\${path}\`, {
                method: 'PUT',
                headers: { 'Authorization': 'token ' + fullTkn },
                body: JSON.stringify({
                    message: "Publish Undangan: " + judul,
                    content: btoa(unescape(encodeURIComponent(finalHTML))),
                    sha: sha || null
                })
            });

            if(upd.ok) alert("BERHASIL! Cek di Arsip.");
        } catch(e) { alert("Gagal bro, cek koneksi/token!"); }
    }

    async function muatArsip() {
        const tkn = localStorage.getItem('master_tkn');
        const res = await fetch(\`https://api.github.com/repos/\${REPO}/contents/skrip\`, {
            headers: { 'Authorization': 'token ' + tkn }
        });
        const data = await res.json();
        let list = "";
        data.forEach(f => {
            list += \`<div style="padding:10px; border-bottom:1px solid #333; font-size:0.8rem;">
                        \${f.name} <a href="https://mj-shops.biz.id/\${f.path}" target="_blank" class="badge bg-primary float-end">Buka</a>
                      </div>\`;
        });
        document.getElementById('list-arsip').innerHTML = list || "Kosong.";
    }
</script>
</body>
</html>
