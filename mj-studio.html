<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MJ STUDIO - FIXED LOGIC</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css">
    <style>
        :root { --gold: #d4af37; --dark-bg: #0a0a0a; --panel: #161616; }
        body { background-color: var(--dark-bg); font-family: sans-serif; color: #fff; padding: 10px; margin: 0; }
        .nav-custom { display: flex; justify-content: center; gap: 5px; margin-bottom: 15px; position: sticky; top: 0; z-index: 100; background: var(--dark-bg); padding: 5px 0; }
        .btn-nav { background: none; border: 1px solid #333; color: #888; padding: 8px 10px; border-radius: 5px; font-size: 0.7rem; flex: 1; }
        .btn-nav.active { border-color: var(--gold); color: var(--gold); background: rgba(212, 175, 55, 0.1); }
        .editor-box { background: var(--panel); padding: 15px; border-radius: 12px; border: 1px solid #222; margin-bottom: 80px; }
        .form-control-dark { background: #000; border: 1px solid #333; color: #fff; margin-bottom: 12px; padding: 10px; width: 100%; border-radius: 6px; font-size: 0.8rem; }
        textarea { min-height: 300px; font-family: monospace; font-size: 11px; border-left: 3px solid var(--gold) !important; }
        .btn-gold { background: var(--gold); color: #000; font-weight: 800; width: 100%; padding: 12px; border: none; border-radius: 6px; text-transform: uppercase; font-size: 0.8rem; }
        #status-bar { position: fixed; bottom: 0; left: 0; right: 0; background: #000; padding: 5px; font-size: 0.6rem; text-align: center; border-top: 1px solid #222; color: var(--gold); }
    </style>
</head>
<body>

<div class="text-center mt-3">
    <h3 style="color:var(--gold); font-weight: 800; margin:0;">MJ STUDIO</h3>
    <p style="font-size:0.5rem; letter-spacing: 3px; color:#555;">FIXED UPLOAD LOGIC</p>
</div>

<div class="nav-custom">
    <button onclick="switchTab('build')" id="tab-build" class="btn-nav">Builder</button>
    <button onclick="switchTab('assets')" id="tab-assets" class="btn-nav">Assets</button>
    <button onclick="switchTab('archive')" id="tab-archive" class="btn-nav">Archive</button>
</div>

<div id="sec-build" class="tab-sec">
    <div class="editor-box">
        <button onclick="configToken()" class="btn btn-sm btn-dark w-100 mb-3" style="font-size:0.6rem; border:1px solid #333">⚙️ CONFIG TOKEN</button>
        <input type="text" id="judulProj" class="form-control-dark" placeholder="Nama Undangan (Contoh: budi-lina)">
        <textarea id="kontenHTML" class="form-control-dark" placeholder="Paste kode HTML di sini..."></textarea>
        <button class="btn-gold" id="btnPublish" onclick="doBuildFinal()">Publish Sekarang</button>
    </div>
</div>

<div id="sec-assets" class="tab-sec d-none"><div class="editor-box" id="asset-container"></div></div>
<div id="sec-archive" class="tab-sec d-none"><div class="editor-box" id="archive-container"></div></div>

<div id="status-bar">READY</div>

<script>
    const REPO = "hamudi2012/Mj-Shops";
    const DOMAIN = "mj-shops.biz.id";

    function switchTab(t) {
        document.querySelectorAll('.tab-sec').forEach(s => s.classList.add('d-none'));
        document.querySelectorAll('.btn-nav').forEach(b => b.classList.remove('active'));
        document.getElementById('sec-' + t).classList.remove('d-none');
        document.getElementById('tab-' + t).classList.add('active');
        if(t !== 'build') refreshList(t === 'assets' ? 'uploads' : 'skrip');
    }

    async function doBuildFinal() {
        const tkn = localStorage.getItem('_gh_tkn_u');
        const inputJudul = document.getElementById('judulProj').value.trim();
        const inputKode = document.getElementById('kontenHTML').value;

        if(!tkn) return alert("Token belum di-set!");
        if(!inputJudul || !inputKode) return alert("Isi Judul dan Kode dulu!");
        
        // Proteksi biar gak salah upload file studio
        if(inputJudul.toLowerCase().includes("mj-studio")) return alert("Nama project tidak boleh mengandung kata 'mj-studio'!");

        updateStatus("Processing...");
        const slug = inputJudul.toLowerCase().replace(/[^a-z0-9]+/g, '-');
        
        // Pecah token biar gak disensor GitHub
        const p1 = "ghp_";
        const p2 = tkn.replace("ghp_", "");

        const rsvpScript = `
        <script>
        async function sendRSVP() {
            const n = document.getElementById('namaTamu').value;
            const h = document.getElementById('hadir').value;
            const p = document.getElementById('pesan').value;
            const t = "${p1}" + "${p2}";
            try {
                await fetch('https://api.github.com/repos/${REPO}/dispatches', {
                    method: 'POST',
                    headers: { 'Authorization': 'token ' + t, 'Accept': 'application/vnd.github.v3+json' },
                    body: JSON.stringify({
                        event_type: 'simpan-ucapan',
                        client_payload: { project_id: '${slug}', data: { nama: n, status: h, ucapan: p, date: new Date().toLocaleString() } }
                    })
                });
                alert("Sukses Terkirim!");
            } catch(e) { alert("Error!"); }
        }
        <\/script>`;

        let finalCode = inputKode.includes("</body>") ? inputKode.replace("</body>", rsvpScript + "</body>") : inputKode + rsvpScript;

        try {
            const res = await fetch(`https://api.github.com/repos/${REPO}/contents/skrip/${slug}.html`, {
                method: 'PUT',
                headers: {'Authorization': `token ${tkn}`},
                body: JSON.stringify({
                    message: "Create: " + slug,
                    content: btoa(unescape(encodeURIComponent(finalCode)))
                })
            });

            if(res.ok) {
                alert("Berhasil! File tersimpan di skrip/" + slug + ".html");
                switchTab('archive');
            } else {
                const err = await res.json();
                alert("Gagal: " + err.message);
            }
        } catch(e) { alert("Sistem Error!"); }
        updateStatus("Ready");
    }

    async function refreshList(folder) {
        const tkn = localStorage.getItem('_gh_tkn_u');
        if(!tkn) return;
        const cont = document.getElementById(folder === 'uploads' ? 'asset-container' : 'archive-container');
        cont.innerHTML = "Loading...";
        try {
            const res = await fetch(`https://api.github.com/repos/${REPO}/contents/${folder}?t=${Date.now()}`, {
                headers: {'Authorization': `token ${tkn}`}
            });
            const data = await res.json();
            cont.innerHTML = "";
            data.reverse().forEach(item => {
                const link = `https://${DOMAIN}/${item.path}`;
                cont.innerHTML += `<div style="padding:10px; border-bottom:1px solid #333; font-size:12px;">
                    ${item.name} <br>
                    <button onclick="window.open('${link}')" style="background:#007bff; color:#fff; border:none; border-radius:3px; padding:2px 10px;">Buka</button>
                </div>`;
            });
        } catch(e) { cont.innerHTML = "Kosong."; }
    }

    function updateStatus(m) { document.getElementById('status-bar').innerText = m.toUpperCase(); }
    function configToken() { 
        const t = prompt("Masukkan Token:"); 
        if(t) { localStorage.setItem('_gh_tkn_u', t.trim()); location.reload(); }
    }
</script>
</body>
</html>
